<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ämtchen Slot Machine - Verlauf aller Zuweisungen">
    <title>History - Ämtchen Slot Machine</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="page-header">
            <h1>📜 Zuweisungs-History</h1>
            <p>Übersicht aller bisherigen Ämtchen-Zuweisungen. Suche nach Monat, Person oder Aufgabe.</p>
        </header>

        <!-- Navigation -->
        <nav class="nav-bar">
            <a href="index.html" class="nav-link">
                <span class="material-icons icon">casino</span>
                Zuweisung
            </a>
            <a href="history.html" class="nav-link active">
                <span class="material-icons icon">history</span>
                History
            </a>
            <a href="board.html" class="nav-link" target="_blank">
                <span class="material-icons icon">dashboard</span>
                Board
            </a>
        </nav>

        <!-- Main Content -->
        <main>
            <!-- Filter & Actions -->
            <section class="card">
                <div class="history-filters">
                    <input type="search" id="history-search" placeholder="🔍 Suche nach Monat, Person oder Aufgabe...">
                    <button id="clear-history-btn" class="btn btn-danger">
                        <span class="material-icons">delete_forever</span>
                        History löschen
                    </button>
                </div>
            </section>

            <!-- History List -->
            <section id="history-list" class="history-list">
                <!-- Wird dynamisch generiert -->
            </section>
        </main>

        <!-- Footer -->
        <footer class="text-center text-muted mt-md">
            <p>Schnyder Werbung &copy; 2026</p>
        </footer>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
