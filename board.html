<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ämtchen Board - Übersichtliche Darstellung der aktuellen Zuweisungen">
    <title>Ämtchen Board</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="board-page">
    <div class="container">
        <!-- Header -->
        <header class="board-header">
            <h1 id="board-month">Monat</h1>
            <h2>Ämtchen Übersicht</h2>
        </header>

        <!-- Board Grid -->
        <div id="assignment-grid" class="board-grid">
            <!-- Wird dynamisch generiert -->
        </div>

        <!-- Footer -->
        <footer class="board-footer">
            <p>Schnyder Werbung &copy; 2026</p>
            <p class="text-muted">Erstellt mit der Ämtchen Slot Machine</p>
        </footer>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
